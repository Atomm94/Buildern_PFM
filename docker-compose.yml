services:
    mysql:
        image: mysql:8.0
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
            MYSQL_DATABASE: ${MYSQL_DATABASE:-pfm_db}
            MYSQL_USER: ${MYSQL_USER:-pfm}
            MYSQL_PASSWORD: ${MYSQL_PASSWORD:-pfm}
        volumes:
            - mysql_data:/var/lib/mysql
        ports:
            - "3307:3306"
        healthcheck:
            test:
                [
                    "CMD",
                    "mysqladmin",
                    "ping",
                    "-h",
                    "127.0.0.1",
                    "-u",
                    "root",
                    "-p${MYSQL_ROOT_PASSWORD:-root}",
                ]
            interval: 5s
            timeout: 3s
            retries: 20

    api:
        build:
            context: ./api
        depends_on:
            mysql:
                condition: service_healthy
        environment:
            NODE_ENV: production
            PORT: 4000
            DATABASE_URL: mysql://${MYSQL_USER:-pfm}:${MYSQL_PASSWORD:-pfm}@mysql:3306/${MYSQL_DATABASE:-pfm_db}
            JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
            JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
            ACCESS_TOKEN_EXPIRES: ${ACCESS_TOKEN_EXPIRES:-15m}
            REFRESH_TOKEN_EXPIRES: ${REFRESH_TOKEN_EXPIRES:-7d}
            WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:5173}
            WEB_BASE_URL: ${WEB_BASE_URL:-http://localhost:5173}
            SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
            SMTP_PORT: ${SMTP_PORT:-587}
            SMTP_USER: ${SMTP_USER:-acct61692@gmail.com}
            SMTP_PASS: ${SMTP_PASS:-nsdj mvtw baql wllr}
            MAIL_FROM: ${MAIL_FROM:-acct61692@gmail.com}
        ports:
            - "4000:4000"
        restart: unless-stopped

    web:
        build:
            context: ./web
            args:
                VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/graphql}
        depends_on:
            - api
        ports:
            - "5173:5173"
        restart: unless-stopped

volumes:
    mysql_data:
